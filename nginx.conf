# Nginx 配置 — 走地
# 放到服务器：/etc/nginx/sites-available/zoudi
# 然后：sudo ln -s /etc/nginx/sites-available/zoudi /etc/nginx/sites-enabled/
# 重载：sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 111.229.165.138;  # 换成你的域名（如有）

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # 静态资源 — Next.js 的 /_next/static 长期缓存
    location /_next/static/ {
        alias /var/www/zoudi/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # public 目录静态文件
    location /public/ {
        alias /var/www/zoudi/public/;
        expires 7d;
    }

    # 其他所有请求转发到 Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
